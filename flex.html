<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Flex box</title>
 <style>
    .container{
        display:flex ;
        gap: 50px;
    }
    .container div{
       border: 3px solid tomato;
       height: 200px;
       width: 200px;

       font-size: 3em;
    }
.box-container{
    display: flex;
    gap:50px ;
}
    .box{
        font-size: 3em;
        height: 150px;
        width: 150px;
        border: 3px solid blue;

    }
    .user-container{

        display: flex;
        gap: 40px;
        justify-content: space-around;

    }

    .user{
        border: 5px solid skyblue;
        height: 150px;
        width: 150px;
        font-size: 3em;
    }
 </style>

    <head>
<div class="container">
<div >1</div> 
<div>2</div>
<div>3</div>
<div>4</div>
<div>5</div>
<div>6</div>
<div>7</div>
<div>8</div>
</div>    

<div class="box-container">
<!-- .box{$}*6 -->

    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>

<div class="user-container"></div>
<!--.user{user-$}*3-->
<div class="user">user-1</div>
<div class="user">user-2</div>
<div class="user">user-3</div>

</div>
</body>
</html>
